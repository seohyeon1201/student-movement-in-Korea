<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>역사 인생 게임 : 우리는 그날의 학생이었다</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            width: 90%;
            max-width: 600px;
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 2px solid #444;
        }
        .status-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background-color: #333;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .status-item {
            font-weight: bold;
        }
        .story-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 100px;
        }
        .choice-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            background-color: #3d3d3d;
            color: white;
            border: 1px solid #555;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            text-align: left;
            transition: all 0.2s;
        }
        .choice-btn:hover {
            background-color: #575757;
            border-color: #888;
        }
        .restart-btn {
            background-color: #8b0000;
            text-align: center;
            font-weight: bold;
        }
        .restart-btn:hover {
            background-color: #b30000;
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- 상단 스탯 창 -->
    <div class="status-container">
        <div class="status-item">🇰🇷 애국심: <span id="patriotism">50</span></div>
        <div class="status-item">💰 독립자금: <span id="money">30</span></div>
        <div class="status-item">🚨 순사 의심도: <span id="suspicion">10</span></div>
    </div>

    <!-- 스토리 출력 영역 -->
    <div id="story" class="story-text">스토리가 로딩 중입니다...</div>

    <!-- 선택지 버튼 영역 -->
    <div id="choices"></div>
</div>

<script>
    // 게임 내부 상태 변수
    let stats = { patriotism: 50, money: 30, suspicion: 10 };

    // 시나리오 데이터베이스
    const storyData = {
        start: {
            text: "1929년 10월 30일, 광주행 통학 기차 안. 일본인 학생들이 댕기머리를 한 조선인 여학생들을 밀치며 조롱하고 있습니다. 주위 사람들은 눈치만 보고 있습니다. 당신은 어떻게 하겠습니까?",
            choices: [
                { text: "“당장 그만두지 못해!” 앞장서서 당당하게 항의한다.", next: "protest", change: { patriotism: 20, suspicion: 15, money: 0 } },
                { text: "지금은 참아야 한다. 분하지만 조용히 친구들을 모아 대책을 세운다.", next: "plan", change: { patriotism: 5, suspicion: 0, money: 0 } }
            ]
        },
        protest: {
            text: "당신의 항의로 기차 안에서 격렬한 난투극이 벌어졌습니다. 이 일로 일본인 교무주임에게 독방에 갇혀 고초를 겪었습니다. 석방된 후, 친구들이 비밀리에 격문을 돌리며 동맹휴학을 준비하자고 제안합니다.",
            choices: [
                { text: "당연히 참여해야지! 인쇄물 제작 비용을 보태고 함께 밤새 격문을 찍어낸다.", next: "print_flyer", change: { patriotism: 20, money: -20, suspicion: 20 } },
                { text: "이미 요주의 인물이 되었다. 들키면 퇴학이다. 뒤에서 몰래 응원하겠다고 말한다.", next: "back_down", change: { patriotism: -15, money: 0, suspicion: -5 } }
            ]
        },
        plan: {
            text: "기차 안에서는 참았지만, 학교에 돌아와 동료들과 비밀 모임인 '독서회'를 소집했습니다. 본격적인 항일 시위를 기획하기 위해 격문을 인쇄하고 확산시켜야 합니다.",
            choices: [
                { text: "내가 가진 용돈을 모두 털어 인쇄용지와 잉크를 사 오겠다.", next: "print_flyer", change: { patriotism: 15, money: -30, suspicion: 10 } },
                { text: "비용은 부담스러우니, 위험하더라도 내가 밤에 몰래 학교 벽에 벽보를 붙이겠다.", next: "post_wall", change: { patriotism: 25, money: 0, suspicion: 30 } }
            ]
        },
        print_flyer: {
            text: "11월 3일, 전교생이 거리로 쏟아져 나왔습니다! 당신이 찍어낸 격문이 광주 시내 전체에 뿌려집니다. “조선 독립 만세!”를 외치며 행진하는 순간, 무장한 일본 경찰들이 총칼을 겨누며 압박해옵니다.",
            choices: [
                { text: "두려움을 이겨내고 대열의 맨 앞에서 깃발을 흔들며 전진한다.", next: "ending_hero", change: { patriotism: 30, money: 0, suspicion: 50 } },
                { text: "경찰의 기세가 심상치 않다. 일단 골목길로 우회하여 대열을 유지한다.", next: "ending_survive", change: { patriotism: 5, money: 0, suspicion: 10 } }
            ]
        },
        post_wall: {
            text: "밤중에 벽보를 붙이다가 순사에게 쫓겼으나 간신히 탈출했습니다. 시위 당일, 거리에는 수천 명의 학생이 모였습니다. 순사들이 주동자를 찾기 위해 눈을 부릅뜨고 수색 중입니다.",
            choices: [
                { text: "잡히더라도 끝까지 목소리를 높여 만세를 외친다.", next: "ending_hero", change: { patriotism: 30, money: 0, suspicion: 40 } },
                { text: "의심도가 너무 높다. 주변에 격문을 나누어주고 인파 속으로 몸을 숨긴다.", next: "ending_survive", change: { patriotism: 10, money: 0, suspicion: -10 } }
            ]
        },
        back_down: {
            text: "시위 당일, 밖에서 들리는 동료들의 만세 소리를 들으며 교실에 남아있었습니다. 하지만 일본 경찰은 평소 눈여겨보던 당신을 배후 조종자로 지목해 연행하려 합니다.",
            choices: [
                { text: "이제 더는 도망치지 않는다. 순사의 멱살을 잡고 만세를 외친다.", next: "ending_hero", change: { patriotism: 40, money: 0, suspicion: 50 } },
                { text: "조사관에게 끝까지 나는 모르는 일이라며 부인한다.", next: "ending_sad", change: { patriotism: -30, money: 0, suspicion: 10 } }
            ]
        },
        // 엔딩 시나리오 분기
        ending_hero: {
            text: "🚨 [엔딩: 민족의 불꽃] 당신은 시위의 최전선에서 체포되어 서대문형무소로 이송되었습니다. 모진 고초를 겪었지만, 당신의 용기는 전국 194개 학교, 5만여 명의 학생이 일어나는 기폭제가 되었습니다. 당신은 역사에 기록될 당당한 독립운동가입니다.",
            choices: [{ text: "다시 도전하기", next: "restart" }]
        },
        ending_survive: {
            text: "🌿 [엔딩: 내일을 위한 생존] 당신은 체포를 피하고 살아남았습니다. 비록 현장에서 붙잡히진 않았지만, 야학을 열어 아이들에게 한글을 가르치고 비밀 독서회를 이어가며 장기적인 독립 체력을 기르는 데 평생을 바치게 됩니다.",
            choices: [{ text: "다시 도전하기", next: "restart" }]
        },
        ending_sad: {
            text: "🌧️ [엔딩: 잊혀진 이름] 당신은 퇴학을 면하고 살아남았으나, 동료들을 외면했다는 죄책감 속에서 평생을 살아가게 됩니다. 역사 속 위대한 불꽃 뒤에는, 두려움에 주저했던 평범한 개인의 아픔도 존재했음을 깨닫습니다.",
            choices: [{ text: "다시 도전하기", next: "restart" }]
        }
    };

    // 화면 업데이트 함수
    function updateScreen(sceneKey) {
        if (sceneKey === "restart") {
            stats = { patriotism: 50, money: 30, suspicion: 10 };
            sceneKey = "start";
        }

        const scene = storyData[sceneKey];
        
        // 1. 스탯 UI 반영
        document.getElementById("patriotism").innerText = stats.patriotism;
        document.getElementById("money").innerText = stats.money;
        document.getElementById("suspicion").innerText = stats.suspicion;

        // 2. 스토리 텍스트 반영
        document.getElementById("story").innerText = scene.text;

        // 3. 선택지 버튼 생성
        const choicesDiv = document.getElementById("choices");
        choicesDiv.innerHTML = ""; // 기존 버튼 초기화

        scene.choices.forEach(choice => {
            const button = document.createElement("button");
            button.className = "choice-btn";
            if(sceneKey.startsWith("ending_")) button.classList.add("restart-btn");
            button.innerText = choice.text;
            
            // 버튼 클릭 시 이벤트
            button.onclick = () => {
                if (choice.change) {
                    stats.patriotism = Math.max(0, stats.patriotism + (choice.change.patriotism || 0));
                    stats.money = Math.max(0, stats.money + (choice.change.money || 0));
                    stats.suspicion = Math.max(0, stats.suspicion + (choice.change.suspicion || 0));
                }
                
                // 특수 조건 엔딩 분기 (예: 의심도가 80을 넘으면 강제 검거 엔딩 등 추가 가능)
                if (stats.suspicion >= 70 && !choice.next.startsWith("ending_")) {
                    updateScreen("ending_hero");
                } else {
                    updateScreen(choice.next);
                }
            };
            choicesDiv.appendChild(button);
        });
    }

    // 게임 시작
    updateScreen("start");
</script>

</body>
</html>
