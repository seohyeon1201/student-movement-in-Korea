<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>역사 인생게임: 그날의 우리</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #2c2c2c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            width: 90%;
            max-width: 600px;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.5);
            border: 2px solid #444;
        }
        #status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: #2a2a2a;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .status-item {
            font-weight: bold;
        }
        #status-patriotism { color: #ff6b6b; }
        #status-alert { color: #ffd23f; }
        #text-box {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 100px;
            word-break: keep-all;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            background-color: #3a3a3a;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #4a4a4a;
            border-color: #ffffd23f;
        }
        #restart-btn {
            background-color: #aa3838;
            text-align: center;
            font-weight: bold;
        }
        #restart-btn:hover { background-color: #cc4444; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 상태창 -->
    <div id="status-bar">
        <div class="status-item">🇰🇷 애국심: <span id="status-patriotism">50</span></div>
        <div class="status-item">🚨 일경 감시도: <span id="status-alert">20</span></div>
    </div>

    <!-- 이야기 화면 -->
    <div id="text-box">게임을 시작합니다.</div>

    <!-- 선택지 버튼들 -->
    <div id="choices-box"></div>
</div>

<script>
    // 상태 변수
    let patriotism = 50;
    let alertLevel = 20;

    // 시나리오 데이터 데이터베이스
    const story = {
        start: {
            text: "1929년 10월 30일, 나주역으로 가는 통학 기차 안. 일본인 학생들이 광주여자고등보통학교 학생들의 댕기머리를 잡아당기며 희롱하고 있습니다. 당신은 광주고등보통학교의 학생입니다. 어떻게 하겠습니까?",
            options: [
                { text: "“당장 사과해라!” 일본인 학생들에게 달려가 당당히 항의한다.", next: "fight", p: 20, a: 15 },
                { text: "분하지만 일단 참고, 학교에 가서 친구들에게 이 사실을 알린다.", next: "school", p: 5, a: -5 }
            ]
        },
        fight: {
            text: "당신의 항의로 기차 안에서 조선인 학생들과 일본인 학생들 간의 큰 싸움이 벌어졌습니다. 이 일로 일본 경찰들이 학교 주변을 삼엄하게 감시하기 시작합니다. 며칠 뒤, 친구들이 비밀리에 모여 대규모 항의 시위를 모의하고 있습니다. 동참하시겠습니까?",
            options: [
                { text: "당연하다. 우리가 가만히 있으면 저들은 우리를 계속 무시할 것이다. 적극 참여한다.", next: "protest", p: 30, a: 30 },
                { text: "경찰의 감시가 너무 심하다. 이번에는 한 발 물러서서 상황을 지켜본다.", next: "watch", p: -10, a: -10 }
            ]
        },
        school: {
            text: "학교에 도착해 친구들에게 기차 안의 일을 알렸습니다. 격분한 친구들이 동맹휴학(등교 거부)을 하고 거리로 나가자고 제안합니다. 하지만 교문 앞에는 이미 일본 경찰들이 칼을 차고 서 있습니다.",
            options: [
                { text: "교문을 밀치고 친구들과 함께 거리로 뛰어나간다.", next: "protest", p: 25, a: 25 },
                { text: "교장 선생님의 훈화를 들으며 교실로 들어간다.", next: "giveup", p: -20, a: -15 }
            ]
        },
        protest: {
            text: "11월 3일, 수천 명의 광주 학생들이 거리로 쏟아져 나왔습니다! “조선 독립 만세!”, “일본 제국주의 타도!”를 외치며 전진합니다. 이때 일본 기마경찰들이 총칼을 겨누며 대형을 무너뜨리려 합니다. 당신은 대열의 맨 앞에 서 있습니다.",
            options: [
                { text: "두렵지만 깃발을 높이 들고 스크럼을 짜서 버틴다.", next: "ending_hero", p: 30, a: 40 },
                { text: "우선 골목길로 우회하여 체포를 피하고 다음 기회를 노린다.", next: "ending_escape", p: 5, a: -10 }
            ]
        },
        watch: {
            text: "당신이 망설이는 사이, 많은 친구가 체포되었습니다. 가슴이 미어집니다. 며칠 후, 광주의 소식이 전국으로 퍼지며 서울에서도 학생들이 연대 시위를 준비한다는 소식이 들립니다. 당신은 어떻게 하겠습니까?",
            options: [
                { text: "친구들의 희생을 헛되이 할 수 없다. 서울로 가서 합류한다.", next: "protest", p: 30, a: 20 },
                { text: "더 이상 위험한 일에 엮이지 않도록 몸을 사린다.", next: "ending_normal", p: -30, a: -10 }
            ]
        },
        giveup: {
            text: "교실에 앉아 창밖의 만세 소리를 듣습니다. 비겁하게 숨었다는 자책감이 몰려옵니다. 일경의 감시는 피했지만, 이대로 평생 일제에 복종하며 살아야 할지도 모릅니다. 마지막 기회입니다. 밤중에 학교 벽에 경고문을 붙이시겠습니까?",
            options: [
                { text: "밤을 틈타 학교 게시판에 '독립정신을 깨우자'는 대자보를 붙인다.", next: "ending_escape", p: 25, a: 25 },
                { text: "아무것도 하지 않고 조용히 졸업을 기다린다.", next: "ending_normal", p: -30, a: -20 }
            ]
        },
        // 엔딩 노드들
        ending_hero: {
            text: "🎉 [엔딩: 학생운동의 불꽃] 당신은 광주학생항일운동의 핵심 주동자로 체포되어 모진 고초를 겪었습니다. 하지만 당신의 용기 덕분에 시위는 전국 300여 개 학교, 5만여 명의 학생이 참여하는 제2의 만세운동으로 번졌습니다. 당신은 역사가 기억할 자랑스러운 대한의 학생입니다.",
            options: []
        },
        ending_escape: {
            text: "🏃‍♂️ [엔딩: 비밀 조직가] 당신은 현장 체포는 면했지만, 일경의 수배를 피해 지하로 숨어들었습니다. 이후 독서회 등 비밀 학생 조직을 결성하여 동료들에게 독립 정신을 전파하는 숨은 조력자가 되었습니다.",
            options: []
        },
        ending_normal: {
            text: "⏳ [엔딩: 평범한 삶, 무거운 마음] 당신은 무사히 학교를 졸업하고 평범하게 살아남았습니다. 하지만 1929년 그해 가을, 거리에서 외치던 친구들의 목소리가 평생 가슴에 무거운 빚으로 남게 되었습니다.",
            options: []
        }
    };

    // 화면 업데이트 함수
    function updatePage(sceneKey) {
        const scene = story[sceneKey];
        
        // 게이지가 한계를 넘었을 때 강제 엔딩 처리 (선택 사항)
        if (alertLevel >= 70 && !sceneKey.startsWith('ending')) {
            document.getElementById('text-box').innerHTML = "🚨 [체포 엔딩] 일경의 감시도가 너무 높아져 결국 비밀 아지트가 발각되었습니다. 당신은 만세 운동을 시작하기도 전에 체포되어 모진 심문을 받게 됩니다.";
            document.getElementById('choices-box').innerHTML = `<button class="btn" id="restart-btn" onclick="restartGame()">다시 도전하기</button>`;
            return;
        }

        // 텍스트 출력
        document.getElementById('text-box').innerText = scene.text;
        
        // 상태창 반영
        document.getElementById('status-patriotism').innerText = patriotism;
        document.getElementById('status-alert').innerText = alertLevel;

        // 선택지 버튼 생성
        const choicesBox = document.getElementById('choices-box');
        choicesBox.innerHTML = '';

        if (scene.options.length > 0) {
            scene.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    // 능력치 변화 적용
                    patriotism = Math.max(0, patriotism + (opt.p || 0));
                    alertLevel = Math.max(0, alertLevel + (opt.a || 0));
                    // 다음 장면으로
                    updatePage(opt.next);
                };
                choicesBox.appendChild(btn);
            });
        } else {
            // 엔딩 도달 시 리스타트 버튼
            const restartBtn = document.createElement('button');
            restartBtn.className = 'btn';
            restartBtn.id = 'restart-btn';
            restartBtn.innerText = '새로운 역사 쓰기 (다시 시작)';
            restartBtn.onclick = restartGame;
            choicesBox.appendChild(restartBtn);
        }
    }

    // 게임 리셋
    function restartGame() {
        patriotism = 50;
        alertLevel = 20;
        updatePage('start');
    }

    // 초기 실행
    updatePage('start');
</script>

</body>
</html>
